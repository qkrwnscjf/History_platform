<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.05" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" />
  
  <rect x="40" y="40" width="720" height="80" rx="16" fill="#ffffff" filter="url(#shadow)" />
  <text x="80" y="88" font-family="sans-serif" font-size="28" font-weight="bold" fill="#1e293b">Frontend Architecture</text>
  <text x="80" y="110" font-family="sans-serif" font-size="14" fill="#64748b">프론트엔드 현재 구성 및 로드맵</text>
  
  <rect x="40" y="150" width="340" height="340" rx="16" fill="#ffffff" filter="url(#shadow)" />
  <text x="70" y="190" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0ea5e9">구현 완료된 아키텍처</text>
  
  <rect x="70" y="220" width="280" height="60" rx="8" fill="#f0fdf4" />
  <text x="85" y="245" font-family="sans-serif" font-size="14" font-weight="bold" fill="#166534">🌐 Vector Map (react-simple-maps)</text>
  <text x="85" y="265" font-family="sans-serif" font-size="11" fill="#166534">- 무거운 타일 대신 SVG 기반의 초경량 렌더링</text>

  <rect x="70" y="295" width="280" height="60" rx="8" fill="#f0fdf4" />
  <text x="85" y="320" font-family="sans-serif" font-size="14" font-weight="bold" fill="#166534">🔍 Floating SearchBar</text>
  <text x="85" y="340" font-family="sans-serif" font-size="11" fill="#166534">- 구글 맵스 스타일의 중앙 배치 &amp; 예측</text>

  <rect x="70" y="370" width="280" height="60" rx="8" fill="#f0fdf4" />
  <text x="85" y="395" font-family="sans-serif" font-size="14" font-weight="bold" fill="#166534">🎨 Modern Styling (Tailwind)</text>
  <text x="85" y="415" font-family="sans-serif" font-size="11" fill="#166534">- 깊은 그림자, 스무스한 다크모드 적용</text>

  <rect x="420" y="150" width="340" height="340" rx="16" fill="#ffffff" filter="url(#shadow)" />
  <text x="450" y="190" font-family="sans-serif" font-size="18" font-weight="bold" fill="#8b5cf6">추후 개발 계획 (To-Do)</text>

  <text x="450" y="235" font-family="sans-serif" font-size="13" fill="#334155">
    <tspan x="450" dy="0">⏳ Interactive Timeline Component</tspan>
    <tspan x="465" dy="20">- 하단에 드래그 가능한 시간축(연도) 추가</tspan>
    <tspan x="465" dy="20">- 시간 이동에 따른 지도 위 마커 동적 변화</tspan>

    <tspan x="450" dy="35">📱 Responsive Mobile Optimization</tspan>
    <tspan x="465" dy="20">- 모바일에서 정보 카드를 Bottom Sheet로 전환</tspan>
    <tspan x="465" dy="20">- 터치 친화적인 스와이프 제스처 도입</tspan>

    <tspan x="450" dy="35">🎓 Educational Story-telling</tspan>
    <tspan x="465" dy="20">- 사건 클릭 시 단순 요약을 넘어,</tspan>
    <tspan x="465" dy="20">  순차적으로 역사를 읽어주는 '투어 모드' 개발</tspan>
  </text>
</svg>